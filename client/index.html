<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function(){
        if(window.matchMedia('(prefers-color-scheme: dark)').matches){
          document.documentElement.classList.add('dark');
        }
        window.addEventListener('error', function(e){
          var d = document.getElementById('root');
          if(d && !d.childNodes.length){
            d.innerHTML = '<div style="padding:20px;font-family:monospace;color:red;background:#fff;"><b>JS Error:</b><pre style="white-space:pre-wrap">' + (e.message||'') + '\n' + (e.filename||'') + ':' + (e.lineno||'') + '\n' + (e.error && e.error.stack ? e.error.stack : '') + '</pre></div>';
          }
        });
        window.addEventListener('unhandledrejection', function(e){
          var d = document.getElementById('root');
          if(d && !d.childNodes.length){
            d.innerHTML = '<div style="padding:20px;font-family:monospace;color:red;background:#fff;"><b>Unhandled Promise:</b><pre style="white-space:pre-wrap">' + (e.reason||'') + '</pre></div>';
          }
        });
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://widget-cdn.boxnow.gr" crossorigin />
    <link rel="preconnect" href="https://widget-v5.boxnow.gr" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap"
      onload="this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
